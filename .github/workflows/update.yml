name: Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:      # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for updates
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh api repos/imputnet/helium-linux/releases/latest --jq '.tag_name')
          CURRENT=$(grep 'version = ' package.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "latest=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$VERSION" != "$CURRENT" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update package
        if: steps.check.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          DEB_URL="https://github.com/imputnet/helium-linux/releases/download/${VERSION}/helium-bin_${VERSION}-1_amd64.deb"

          HASH=$(nix-prefetch-url "$DEB_URL" 2>/dev/null)
          SRI_HASH=$(nix hash convert --to sri --hash-algo sha256 "$HASH")

          if [[ ! "$SRI_HASH" =~ ^sha256- ]]; then
            echo "ERROR: Invalid SRI hash: $SRI_HASH"
            exit 1
          fi

          echo "New hash: $SRI_HASH"

          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" package.nix
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$SRI_HASH\"|" package.nix

          git diff package.nix

      - name: Test build
        if: steps.check.outputs.needs_update == 'true'
        run: |
          nix build .#helium --accept-flake-config

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        env:
          VERSION: ${{ steps.check.outputs.latest }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix
          git commit -m "Update helium to ${VERSION}"
          git push

      - name: Create Release
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.latest }}
          PREVIOUS: ${{ steps.check.outputs.current }}
        run: |
          gh release create "v${VERSION}" \
            --title "helium ${VERSION}" \
            --notes "Updated helium from ${PREVIOUS} to ${VERSION}"
